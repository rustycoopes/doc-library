{% extends "chrome_authenticated_base.html" %}

{% block title %}Doc Library{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
{% endblock %}

{% block page %}
<div class="mx-auto max-w-2xl">
  <h1 class="text-2xl font-bold">Doc Library</h1>

  <form
    class="mt-4 flex flex-col gap-2 rounded-lg border border-base-300 p-4"
    hx-post="/doc-library/fragments/links"
    hx-target="#doc-links-list"
    hx-swap="outerHTML"
    hx-on::after-request="if(event.detail.successful) this.reset()"
  >
    <input
      type="text"
      name="title"
      required
      minlength="1"
      maxlength="200"
      class="input input-bordered input-sm"
      placeholder="Title"
    />
    <input
      type="url"
      name="url"
      required
      class="input input-bordered input-sm"
      placeholder="https://..."
    />
    <input
      type="text"
      name="category"
      required
      minlength="1"
      maxlength="100"
      class="input input-bordered input-sm"
      placeholder="Category"
    />
    <button type="submit" class="btn btn-sm btn-primary">Add link</button>
  </form>

  {% include "partials/doc_links_list.html" %}
</div>
{% endblock %}
